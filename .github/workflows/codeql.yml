name: codeql

# CodeQL static analysis for Python (backend) + TypeScript/JavaScript (frontend).
#
# The `analyze` job is gated on the repository being public — code scanning
# is free on public repos but a paid add-on (GitHub Advanced Security) on
# private ones. The gate is a safety net: if the repo ever flips back to
# private, analysis stops cleanly instead of hitting a billing wall.
#
# Once the gate clears: each push to `main`, each PR, and the weekly cron
# fire a CodeQL analysis. Results post to the Security tab → Code scanning
# alerts as severity-rated dataflow findings (taint, deserialization, SSRF,
# command injection, etc.). The Monday 06:00 UTC schedule catches regressions
# in upstream queries that didn't fire on prior pushes — recommended in
# GitHub's CodeQL setup docs.
#
# Hardening (matches the rest of `.github/workflows/`):
# - All third-party actions SHA-pinned with a `# tag` comment.
# - Top-level `permissions:` block scoped to the minimum (`contents: read`
#   for checkout, `security-events: write` for the upload-results step,
#   `actions: read` for private-mode action metadata).
# - `pull_request` (not `pull_request_target`) — fork-PR escalation closed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Monday 06:00 UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    # Private repos require GitHub Advanced Security (paid) for code scanning;
    # public repos get it for free. Skip while private — re-activates
    # automatically whenever the repo is public.
    if: ${{ !github.event.repository.private }}
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - python
          - javascript-typescript
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          # Default + `security-extended` query suite — broader coverage at
          # the cost of more findings to triage. Drop to default only if the
          # extended pack's noise outweighs its signal in practice.
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:${{ matrix.language }}"
