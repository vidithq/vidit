name: docs-pairing

# Lightweight, opinionated guardrail: every PR to `main` must touch
# at least one file under `docs/` AND at least one file under
# `planning/`. The intent is friction, not granular pairing rules:
#
# - `docs/` is the reference surface (api / data-model / engineering /
#   design / backups). If a change is doc-worthy at all, *something*
#   under here usually moves.
# - `planning/` is the in-flight tracker (`next.md` + `roadmap.md`).
#   A shipped change should remove or amend a tracker row; a non-
#   shipped change (refactor, bugfix never on the tracker) is rare
#   enough that touching `planning/next.md` with a brief note in the
#   relevant macro is reasonable overhead.
#
# Renamed from the previous `doc-sync.yml` (which had ~5 granular
# `routers ↔ api.md` style rules) because GitHub Actions got stuck
# on the old workflow's registration after #7 — the simple-rename
# forces a fresh registration record.
#
# If a rule fires legitimately for a PR that genuinely doesn't need
# either touch, justify it in the PR description; the rule is a
# friction-first guardrail, not a hard contract.
#
# Exempt from the rule: Dependabot PRs. Routine version-bump PRs
# (security or version-update) don't carry reference-doc or tracker
# impact — every Dependabot bump that would, gets its own human-
# authored CHANGELOG entry on merge anyway. Forcing a doc/+planning/
# touch on each weekly Dependabot wave is friction without signal.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: PR touches docs/ and planning/
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Note Dependabot exemption
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        run: |
          echo "✓ Dependabot PR — docs-pairing check is exempt for routine version bumps."
          echo "If this PR turns out to need a doc / planning note (e.g., a breaking-change migration), the human handling the merge adds it via a follow-up commit on the branch."

      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        with:
          fetch-depth: 0

      - name: Enumerate changed files
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          MERGE_BASE=$(git merge-base "$BASE" "$HEAD")
          git diff --name-only "$MERGE_BASE..$HEAD" > /tmp/changed.txt
          echo "Changed files in this PR:"
          cat /tmp/changed.txt

      - name: Check docs/ + planning/ touched
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        run: |
          set -e
          FILES=$(cat /tmp/changed.txt)
          touched() { echo "$FILES" | grep -qE "$1"; }
          FAIL=0

          if ! touched '^docs/'; then
            echo "::error::No file under docs/ was touched. Every PR should update reference docs (api / data-model / engineering / design / backups) when production behavior, API surface, schema, or operational config changes. If the PR genuinely has no docs/ impact, justify it in the description and override the check."
            FAIL=1
          fi

          if ! touched '^planning/'; then
            echo "::error::No file under planning/ was touched. Every PR should update the tracker — remove or amend a row in planning/next.md for shipped work, or leave a brief note in the relevant macro for changes that weren't tracked. If the PR genuinely has no planning impact, justify it in the description and override."
            FAIL=1
          fi

          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "::error::docs-pairing check failed."
            exit 1
          fi

          echo "✓ docs/ and planning/ both touched."
