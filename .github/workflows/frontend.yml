name: frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:

# Least-privilege: lint + type-check + build only. No PR comments, no pushes,
# no artefact publication. ``contents: read`` is the minimum for checkout.
permissions:
  contents: read

defaults:
  run:
    working-directory: frontend

jobs:
  check:
    name: Lint, type-check, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Sentinel value: api.ts hard-fails if unset, but CI doesn't deploy
          # the bundle so the URL just needs to exist, not work. Real deploys
          # get the production URL from Vercel project settings.
          NEXT_PUBLIC_API_URL: https://api.invalid
